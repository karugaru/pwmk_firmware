cmake:
  board: pico_w
  enable_usb: true
  enable_ble: true

board:
  rows_pins: [10, 11, 12, 13, 14]
  cols_pins: [21, 20, 19, 18, 17]
  gpio_sda_pin: 4
  gpio_scl_pin: 5
  gpio_dr_pin: 6
  gpio_led_pin: 16
  pin_settle_time_us: 1
  layout:
    - [0, 0]
    - [0, 1]
    - [0, 2]
    - [0, 3]
    - [0, 4]
    - [1, 0]
    - [1, 1]
    - [1, 2]
    - [1, 3]
    - [1, 4]
    - [2, 0]
    - [2, 1]
    - [2, 2]
    - [2, 3]
    - [2, 4]
    - [3, 0]
    - [3, 1]
    - [3, 2]
    - [3, 3]
    - [3, 4]
    - [4, 0]

keymap:
  user_keycodes:
    IUC_BLACKSCREEN: LEFT_ALT(LEFT_CTRL(IKC_F10))
  keymap:
    - ISC_BOOT
    - IKC_SPACE
    - IUC_BLACKSCREEN
    - IMKC_LEFT_CONTROL
    - IMKC_LEFT_SHIFT
    - IMKC_LEFT_ALT
    - IKC_NOOP
    - IKC_NOOP
    - IMKC_LEFT_GUI
    - IMC_MOUSE_LEFT
    - IMC_MOUSE_MIDDLE
    - IMC_MOUSE_RIGHT
    - ICC_REWIND
    - IKC_UP_ARROW
    - ICC_FAST_FORWARD
    - IKC_LEFT_ARROW
    - ICC_PLAY_PAUSE
    - IKC_RIGHT_ARROW
    - ICC_PREV_TRACK
    - IKC_DOWN_ARROW
    - ICC_NEXT_TRACK

settings:
  deep_sleep_timeout_seconds: 300
  led_brightness: 16
  debounce_time_ms: 5
  mouse_move_delta: 1
  mouse_move_thresh: 1
  mouse_wheel_delta: 1
  mouse_wheel_thresh: 64
  use_pinnacle: true
  ble_persist_selected_slot: true
  pinnacle:
    rotate: PINNACLE_ROTATE_270
    accel: 1.2
    speed: 0.8
